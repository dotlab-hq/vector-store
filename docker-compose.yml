services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python -m uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - qdrant
      - redis
      - neo4j
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python -m apps.worker
    env_file: .env
    depends_on:
      - postgres
      - qdrant
      - redis
      - neo4j
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vector_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5-enterprise
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-your-neo4j-password}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  neo4jdata:
