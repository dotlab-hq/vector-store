<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agentic RAG</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['ui-sans-serif', 'system-ui', '-apple-system', '"Segoe UI"', 'Roboto', 'Inter', 'sans-serif'],
        },
      },
    },
  };
</script>
<style>
  [data-lucide] { width: 1em; height: 1em; vertical-align: -0.125em; }
  html, body { height: 100%; }
</style>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100 font-sans antialiased flex items-center justify-center p-8 overflow-hidden">

  <main class="text-center max-w-5xl">
    <div class="inline-flex items-center gap-2 px-3.5 py-1.5 border border-zinc-800 rounded-full text-zinc-500 text-xs tracking-[0.2em] uppercase mb-10">
      <i data-lucide="hexagon" class="w-3.5 h-3.5"></i>
      <span>agentic rag</span>
    </div>
    <h1 class="text-5xl sm:text-6xl md:text-8xl font-semibold tracking-tighter leading-[1.02]">
      Meet the future of vector store
      <span class="inline-flex align-middle ml-2 -mt-1 text-zinc-500">
        <i data-lucide="database" class="w-[0.85em] h-[0.85em]"></i>
      </span>
    </h1>
    <div class="flex items-center justify-center gap-4 mt-14">
      <a href="/playground" class="group inline-flex items-center gap-2 px-6 py-3 border border-zinc-700 text-zinc-100 no-underline text-sm tracking-wider uppercase transition-colors hover:border-zinc-300 hover:text-white">
        Playground
        <i data-lucide="play" class="w-4 h-4 transition-transform group-hover:translate-x-0.5"></i>
      </a>
      <a href="/util" class="group inline-flex items-center gap-2 px-6 py-3 border border-zinc-700 text-zinc-100 no-underline text-sm tracking-wider uppercase transition-colors hover:border-zinc-300 hover:text-white">
        Configure
        <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
      </a>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
